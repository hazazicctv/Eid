<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة عيد مبارك | Eid Greeting Card</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
      font-family: Tahoma, Arial, sans-serif;
      text-align: center;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 15px;
      color: #444;
      font-size: 16px;
    }

    input {
      width: 320px;
      max-width: 90%;
      padding: 12px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 10px;
      text-align: center;
      font-family: Tahoma, Arial, sans-serif;
    }

    .buttons {
      margin: 14px 0 18px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      margin: 5px;
      cursor: pointer;
      background: #111;
      color: #fff;
      font-family: Tahoma, Arial, sans-serif;
    }

    canvas {
      display: block;
      max-width: 100%;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
    }

    #status {
      margin-bottom: 12px;
      color: #666;
      font-size: 14px;
    }

    #sourceImage {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎉 بطاقة عيد مبارك | Eid Greeting Card</h1>
    <p>اكتب اسمك هنا | Enter your name here</p>

    <input
      id="nameInput"
      type="text"
      placeholder="اكتب اسمك هنا | Enter your name here"
    />

    <div class="buttons">
      <button type="button" onclick="generateCard()">
        إنشاء البطاقة | Generate Card
      </button>
      <button type="button" onclick="downloadCard()">
        تحميل البطاقة | Download Card
      </button>
    </div>

    <div id="status">جاري تحميل البطاقة... | Loading card...</div>

    <img id="sourceImage" src="EidHazazi.png" alt="Card image" />
    <canvas id="cardCanvas"></canvas>
  </div>

  <script>
    const sourceImage = document.getElementById("sourceImage");
    const canvas = document.getElementById("cardCanvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const nameInput = document.getElementById("nameInput");

    let ready = false;
    let generated = false;

    function drawBaseCard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(sourceImage, 0, 0, canvas.width, canvas.height);
    }

    sourceImage.onload = function () {
      canvas.width = sourceImage.naturalWidth;
      canvas.height = sourceImage.naturalHeight;
      drawBaseCard();
      statusEl.textContent = "البطاقة جاهزة | Card is ready";
      ready = true;
    };

    sourceImage.onerror = function () {
      statusEl.textContent = "تعذر تحميل الصورة | Failed to load image";
      alert("الصورة لم تتحمل. تأكد أن اسمها EidHazazi.png");
    };

    function generateCard() {
      if (!ready) {
        alert("الصورة لم تجهز بعد | Image is still loading");
        return;
      }

      const name = nameInput.value.trim();

      if (!name) {
        alert("اكتب اسمك أولاً | Please enter your name first");
        return;
      }

      drawBaseCard();

      let fontSize = 54;
      if (name.length > 14) fontSize = 44;
      if (name.length > 22) fontSize = 36;

      ctx.fillStyle = "black";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold " + fontSize + "px Tahoma";

      const x = canvas.width / 2;
      const y = canvas.height * 0.77; // نازل أكثر

      ctx.fillText(name, x, y);
      generated = true;
    }

    function downloadCard() {
      if (!ready) {
        alert("الصورة لم تجهز بعد | Image is still loading");
        return;
      }

      if (!generated) {
        alert("أنشئ البطاقة أولاً | Please generate the card first");
        return;
      }

      const link = document.createElement("a");
      link.download = "eid-card.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
