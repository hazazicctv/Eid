<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة عيد مبارك | Eid Greeting Card</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 28px;
    }

    p {
      margin-top: 0;
      color: #444;
      font-size: 16px;
    }

    input {
      padding: 12px;
      font-size: 18px;
      width: 320px;
      max-width: 90%;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin: 10px 0;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    button:hover {
      opacity: 0.9;
    }

    canvas {
      margin-top: 20px;
      max-width: 100%;
      height: auto;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

  <h1>🎉 بطاقة عيد مبارك | Eid Greeting Card</h1>
  <p>اكتب اسمك هنا | Enter your name here</p>

  <input type="text" id="nameInput" placeholder="اكتب اسمك هنا | Enter your name here" />
  <br>

  <button onclick="generateImage()">إنشاء البطاقة | Generate Card</button>
  <button onclick="downloadImage()">تحميل البطاقة | Download Card</button>

  <br>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const image = new Image();
    image.src = "EidHazazi.png";

    let imageLoaded = false;
    let cardGenerated = false;

    image.onload = function () {
      canvas.width = image.width;
      canvas.height = image.height;
      ctx.drawImage(image, 0, 0);
      imageLoaded = true;
    };

    function generateImage() {
      const name = document.getElementById("nameInput").value.trim();

      if (!imageLoaded) {
        alert("الصورة لم تكتمل بعد | Image is still loading");
        return;
      }

      if (!name) {
        alert("اكتب اسمك أولاً | Please enter your name first");
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(image, 0, 0);

      let fontSize = 52;
      if (name.length > 14) fontSize = 42;
      if (name.length > 22) fontSize = 34;

      ctx.fillStyle = "black";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold " + fontSize + "px Arial";

      const x = canvas.width / 2;
      const y = canvas.height * 0.79; // نزلت الاسم أكثر

      ctx.fillText(name, x, y);
      cardGenerated = true;
    }

    function downloadImage() {
      if (!imageLoaded) {
        alert("الصورة لم تكتمل بعد | Image is still loading");
        return;
      }

      if (!cardGenerated) {
        alert("أنشئ البطاقة أولاً | Please generate the card first");
        return;
      }

      const link = document.createElement("a");
      link.download = "eid-card.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>

</body>
</html>
